server:
  port: ${PORT:0}

spring:
  application:
    name: albums-ws
  devtools:
    restart:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}


logging:
  file: albums-ws.log
  pattern:
    level: "%5p [${spring.application.name}, %X{traceId:-}, %X{spanId:-}]"

management:
  tracing:
    sampling:
      probability: 1.0  # 1.0 = 100% próbek (domyślnie 0.1 = 10%)
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
