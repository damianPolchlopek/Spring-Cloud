spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-ws-checker
          uri: lb://user-ws
          predicates:
            - Path=/users/status/check
            - Method=GET
            - Header=Authorization, Bearer (.*)
          filters:
            - RemoveRequestHeader=Cookie
            - AuthorizationHeaderFilter

        - id: users-ws-login
          uri: lb://user-ws
          predicates:
            - Path=/users-ws/users/login
            - Method=POST
          filters:
            - RemoveRequestHeader=Cookie
            - StripPrefix=1

        - id: create-user
          uri: lb://user-ws
          predicates:
            - Path=/users
          filters:
            - RemoveRequestHeader=Cookie


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8082

