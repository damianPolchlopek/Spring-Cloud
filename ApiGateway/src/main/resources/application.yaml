spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-ws-checker
          uri: lb://user-ws
          predicates:
            - Path=/users/status/check
            - Method=GET
          filters:
            - RemoveRequestHeader=Cookie

        - id: users-post
          uri: lb://user-ws
          predicates:
            - Path=/users/**
          filters:
            - RemoveRequestHeader=Cookie

        - id: users-ws
          uri: lb://user-ws
          predicates:
            - Path=/users-ws/**
          filters:
            - RemoveRequestHeader=Cookie
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8082

