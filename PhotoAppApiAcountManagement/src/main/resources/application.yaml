spring:
  application:
    name: account-ws
  devtools:
    restart:
      enabled: true
  config:
    import: "configserver:http://localhost:8012"
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest


server:
  port: 0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    instance-id: ${spring.application.name}:${random.value}
